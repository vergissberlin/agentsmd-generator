<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="faceGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c7d2fe"/>
      <stop offset="100%" stop-color="#ddd6fe"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="url(#bgGrad)"/>

  <!-- Robot head -->
  <rect x="55" y="48" width="90" height="75" rx="14" fill="url(#faceGrad)"/>

  <!-- Antenna -->
  <rect x="96" y="30" width="8" height="20" rx="4" fill="#c7d2fe"/>
  <circle cx="100" cy="28" r="7" fill="#a5b4fc"/>
  <circle cx="100" cy="28" r="3" fill="#6366f1"/>

  <!-- Eyes / screen -->
  <rect x="63" y="58" width="74" height="42" rx="8" fill="url(#screenGrad)"/>

  <!-- Left eye (code bracket) -->
  <text x="74" y="87" font-family="monospace" font-size="20" font-weight="bold" fill="#818cf8">&lt;/&gt;</text>

  <!-- Right eye (cursor) -->
  <rect x="120" y="68" width="8" height="22" rx="2" fill="#a5b4fc" opacity="0.9"/>
  <rect x="128" y="68" width="4" height="22" rx="2" fill="#6366f1" opacity="0.6"/>

  <!-- Mouth / lines -->
  <rect x="70" y="108" width="60" height="5" rx="2.5" fill="#a5b4fc" opacity="0.7"/>

  <!-- Ears -->
  <rect x="42" y="72" width="14" height="30" rx="7" fill="#a5b4fc"/>
  <rect x="144" y="72" width="14" height="30" rx="7" fill="#a5b4fc"/>

  <!-- Body / document -->
  <rect x="62" y="130" width="76" height="42" rx="10" fill="#ede9fe"/>

  <!-- Document lines -->
  <rect x="72" y="140" width="56" height="4" rx="2" fill="#8b5cf6" opacity="0.7"/>
  <rect x="72" y="150" width="44" height="4" rx="2" fill="#8b5cf6" opacity="0.5"/>
  <rect x="72" y="160" width="50" height="4" rx="2" fill="#8b5cf6" opacity="0.4"/>

  <!-- Document fold corner -->
  <polygon points="130,130 138,138 130,138" fill="#c4b5fd"/>

  <!-- Sparkle top-right -->
  <g transform="translate(155,42)">
    <line x1="0" y1="-8" x2="0" y2="8" stroke="#e0e7ff" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-8" y1="0" x2="8" y2="0" stroke="#e0e7ff" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-5" y1="-5" x2="5" y2="5" stroke="#e0e7ff" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="5" y1="-5" x2="-5" y2="5" stroke="#e0e7ff" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Sparkle bottom-left -->
  <g transform="translate(42,155)">
    <line x1="0" y1="-5" x2="0" y2="5" stroke="#c7d2fe" stroke-width="2" stroke-linecap="round"/>
    <line x1="-5" y1="0" x2="5" y2="0" stroke="#c7d2fe" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
